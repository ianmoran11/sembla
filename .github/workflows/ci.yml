name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect path-filtered work
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      npe: ${{ steps.filter.outputs.npe }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect NPE changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            npe:
              - 'calibration/**'
              - 'docs/prds-npe-path/**'

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain and restore Cargo cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Parse workflow YAML
        run: ruby scripts/check-workflow-yaml.rb
      - name: Repository checks
        run: ./scripts/check.sh
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Test workspace
        run: cargo test --workspace --locked

  determinism:
    name: Determinism
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain and restore Cargo cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Double-run byte comparisons
        run: ./scripts/check-determinism.sh

  lean:
    name: Lean frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain and restore Cargo cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install pinned Lean toolchain and restore Lake cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: frontend
          auto-config: false
      - name: Build and test the Lean frontend
        run: bash frontend/scripts/check-parity.sh

  npe-smoke:
    name: NPE smoke
    needs: changes
    if: needs.changes.outputs.npe == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: calibration/npe/requirements.txt
      - name: Install pinned NPE dependencies
        run: python -m pip install -r calibration/npe/requirements.txt
      - name: Run tiny training and refusal smoke tests
        run: ./scripts/check-npe-smoke.sh
